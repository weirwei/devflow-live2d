<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DPartner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" id="shell">
      <section class="bubble bubble--hidden" id="bubble">
        <div class="bubble__status-text" id="bubbleStatus"></div>
        <div class="bubble__status">
          <span class="bubble__status-dot" id="bubbleStatusDot" aria-hidden="true"></span>
          <div class="bubble__project" id="bubbleProject"></div>
        </div>
        <div class="bubble__text" id="bubbleText"></div>
      </section>

      <section class="avatar-stage" id="avatarStage">
        <div class="avatar-stage__glow"></div>
        <div class="avatar-shell" id="avatarShell" data-mood="calm" data-motion="idleWave">
          <div class="avatar-shell__ornament"></div>
          <div class="avatar-shell__body">
            <div class="avatar-shell__badge" data-avatar-badge>idleWave</div>
            <div class="avatar-shell__eyes" data-avatar-eyes>◕ ◕</div>
            <div class="avatar-shell__mouth" data-avatar-mouth>﹏</div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
